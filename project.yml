name: PitWall
options:
  bundleIdPrefix: com.pitwall
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: YES  # Set DEVELOPMENT_TEAM in Secrets.xcconfig for device builds
    CODE_SIGN_IDENTITY: ""
    SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: YES
targets:
  PitWall:
    type: application
    platform: iOS
    sources:
      - path: PitWall/Sources/PitWall
    info:
      path: PitWall/Sources/PitWall/Info.plist
      properties:
        CFBundleDisplayName: PitWall
        PITWALL_LOBBY_URL: $(PITWALL_LOBBY_URL)
        PITWALL_CLIENT_KEY: $(PITWALL_CLIENT_KEY)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitwall.app
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: PITWALL_APP
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
  PitWallMac:
    type: application
    platform: macOS
    sources:
      - path: PitWall/Sources/PitWall
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitwall.mac
        PRODUCT_NAME: PitWall
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: PITWALL_APP
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_PITWALL_LOBBY_URL: $(PITWALL_LOBBY_URL)
        INFOPLIST_KEY_PITWALL_CLIENT_KEY: $(PITWALL_CLIENT_KEY)
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
